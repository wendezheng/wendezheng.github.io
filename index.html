<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫游奇想国动画生成</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f0f4f9;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .app-container {
            background-color: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            padding: 2rem;
            max-width: 1300px;
            width: 100%;
        }

        /* 头部区域 */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #2d4066;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }

        .star-icon {
            color: #4a5b8b;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: none;
            background-color: #f0f4f9;
            color: #4a5b8b;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .action-btn:hover {
            background-color: #4a5b8b;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 91, 139, 0.2);
        }

        /* 视频容器 */
        .video-wrapper {
            background-color: #1f2430;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16 / 9;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #cbd5e1;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        /* 占位提示 */
        .placeholder-content {
            text-align: center;
        }

        .placeholder-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            opacity: 0.7;
        }

        .placeholder-title {
            font-size: 1.6rem;
            font-weight: 500;
            margin-bottom: 1rem;
            color: #e2e8f0;
        }

        .placeholder-desc {
            font-size: 1rem;
            opacity: 0.7;
        }

        /* 视频元素 */
        #videoPlayer {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        /* 自定义控制条（可选，这里用原生控制条，保持简洁） */
        #videoPlayer::-webkit-media-controls-panel {
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
        }

        /* 隐藏原生上传控件 */
        #fileInput {
            display: none;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .app-container {
                padding: 1.5rem;
            }
            .title {
                font-size: 1.6rem;
            }
            .placeholder-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 头部标题与按钮 -->
        <div class="header">
            <h1 class="title">
                <span class="star-icon">✦</span>
                漫游奇想国动画生成
                <span class="star-icon">✧</span>
            </h1>
            </div>

        <!-- 视频播放区域 -->
        <div class="video-wrapper">
            <!-- 占位提示 -->
            

        
	<video width="100%" controls autoplay muted>
        <!-- 这里填你的视频文件名，比如 video.mp4 -->
        <source src="video.mp4" type="video/mp4">
        你的浏览器不支持视频播放
    </video>
        </div>
    </div>

    <script>
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const videoPlayer = document.getElementById('videoPlayer');
        const placeholder = document.getElementById('placeholder');

        // 点击按钮触发文件选择
        uploadBtn.addEventListener('click', () => {
            fileInput.click();
        });

        // 选择文件后加载视频
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('video/')) {
                const url = URL.createObjectURL(file);
                videoPlayer.src = url;
                videoPlayer.style.display = 'block';
                placeholder.style.display = 'none';
                videoPlayer.play().catch(() => {}); // 自动播放，失败也不报错
            }
        });
    </script>
</body>
</html>
