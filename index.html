<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>在线视频播放</title>
</head>
<body>
    <!-- 视频标签，controls 显示播放/暂停/进度条 -->
    <video width="800" controls autoplay muted>
        <!-- 这里填你的视频文件名，比如 video.mp4 -->
        <source src="video.mp4" type="video/mp4">
        你的浏览器不支持视频播放
    </video>
</body>
</html>
